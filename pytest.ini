[pytest]
markers =
    integration: marks tests as integration tests (make real API calls)
asyncio_mode = auto
# Integration tests hit real, paid LLM APIs and depend on live-model output
# (e.g. DeepSeek must return strict ReAct JSON), so they are nondeterministic
# and credential-dependent. Deselect them by default — the default suite must
# stay deterministic and offline. Run them explicitly with valid creds via:
#   pytest tests/integration -m integration
addopts = -m "not integration"
